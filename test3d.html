<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test 3D - Étape 3 : Placeholder joueur</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  #info {
    position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace;
    background: rgba(0,0,0,0.6); padding: 10px; z-index: 20; font-size: 13px;
  }

  /* ===========================================
     HUD COMBAT — façon Dragon Quest III HD-2D
     Réutilise les variables couleur du thème existant du jeu
     (--gold, --parchment, etc., copiées depuis style.css) pour rester
     cohérent visuellement avec le reste de MyPixelRogue.
     =========================================== */
  :root {
    --forest-darkest: #1f2e1c;
    --parchment-light: #f5ecd4;
    --gold-light: #e0c478;
  }

  .dq-hud-stack {
    position: fixed;
    top: 28px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    z-index: 15;
    pointer-events: none; /* le HUD ne doit jamais bloquer le clic sur la scène 3D derrière */
  }

  .dq-hud-card { min-width: 190px; text-align: right; }

  .dq-hud-name {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 19px;
    color: var(--parchment-light);
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 7px;
    letter-spacing: 0.5px;
  }

  .dq-hud-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 3px;
  }

  .dq-hud-label {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    font-weight: bold;
    color: var(--gold-light);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    width: 28px;
    flex-shrink: 0;
  }

  .dq-hud-bar-track {
    width: 130px;
    height: 9px;
    background: rgba(10, 8, 5, 0.55);
    border-radius: 5px;
    overflow: hidden;
  }

  .dq-hud-bar-fill { height: 100%; border-radius: 5px; transition: width 0.4s ease; }
  .dq-hud-bar-fill.hp { background: linear-gradient(180deg, #8fd95f, #5fae34); }
  .dq-hud-bar-fill.mp { background: linear-gradient(180deg, #6fc8e8, #2f8fc0); }

  .dq-hud-value {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 14px;
    color: var(--parchment-light);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    min-width: 28px;
    text-align: right;
  }

  .dq-action-menu {
    position: fixed;
    bottom: 28px;
    left: 24px;
    background: rgba(12, 18, 10, 0.62);
    border: 1.5px solid rgba(234, 217, 182, 0.55);
    border-radius: 4px;
    min-width: 320px;
    padding: 10px 0;
    z-index: 15;
    cursor: pointer;
  }

  .dq-action-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 13px 26px;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 22px;
    color: var(--parchment-light);
    text-shadow: 0 2px 3px rgba(0,0,0,0.8);
  }

  .dq-action-cursor {
    width: 0; height: 0;
    border-left: 11px solid var(--gold-light);
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    opacity: 0;
    flex-shrink: 0;
  }
  .dq-action-item.active .dq-action-cursor { opacity: 1; }
</style>
</head>
<body>
<div id="info">ÉTAPE 3 : + Placeholder joueur (carré coloré) en bas de l'écran</div>
<canvas id="scene3d"></canvas>

<!-- HUD HTML/CSS posé PAR-DESSUS le canvas 3D (pointer-events: none sur le
     conteneur HP/MP pour ne jamais bloquer une interaction avec la scène 3D,
     mais le menu d'actions reste cliquable). -->
<div class="dq-hud-stack">
  <div class="dq-hud-card">
    <div class="dq-hud-name">Kimimi</div>
    <div class="dq-hud-row">
      <span class="dq-hud-label">HP</span>
      <div class="dq-hud-bar-track"><div class="dq-hud-bar-fill hp" style="width:82%"></div></div>
      <span class="dq-hud-value">58</span>
    </div>
    <div class="dq-hud-row">
      <span class="dq-hud-label">MP</span>
      <div class="dq-hud-bar-track"><div class="dq-hud-bar-fill mp" style="width:8%"></div></div>
      <span class="dq-hud-value">5</span>
    </div>
  </div>
</div>

<div class="dq-action-menu">
  <div class="dq-action-item active">
    <span class="dq-action-cursor"></span>
    <span>Attaque</span>
  </div>
  <div class="dq-action-item">
    <span class="dq-action-cursor"></span>
    <span>Magie</span>
  </div>
  <div class="dq-action-item">
    <span class="dq-action-cursor"></span>
    <span>Fuir</span>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';


// ===========================================
// SCÈNE, CAMÉRA, RENDU
// ===========================================
const scene = new THREE.Scene();

const fogColor = 0x1a3a4a;
// Réglage near=6/far=28 : recalculé pour la forêt en 3 couches (proche
// z≈-10, moyenne z≈-14, loin z≈-19). Avec l'ancien far=22, la couche loin
// (distance ≈24.5 de la caméra) tombait à un facteur de fog de 1.0, donc
// totalement invisible — bug détecté par calcul avant livraison. Avec
// far=28 : ennemi net (0%), couche proche 43% fondue, moyenne 61%, loin 84%
// (visible mais très assombrie) — progression de profondeur cohérente.
scene.fog = new THREE.Fog(fogColor, 6, 28);
scene.background = new THREE.Color(fogColor);

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(0, 2.6, 6.5);
camera.lookAt(0, 1.0, -2);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene3d'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// ===========================================
// LUMIÈRES
// ===========================================
const ambient = new THREE.AmbientLight(0x4a6a7a, 1.2);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xaaccdd, 0.8);
dirLight.position.set(-3, 8, 2);
scene.add(dirLight);

// ===========================================
// SOL — texture étirée une seule fois (pas de répétition)
// ===========================================
// La texture sprites/decor/sol_herbe_01.png a été nettoyée (ciel et logo
// retirés) mais n'est PAS conçue pour se répéter sans coutures visibles
// (plusieurs tentatives de la rendre "tileable" ont été testées et
// donnaient toutes un motif de répétition trop visible). Décision : un
// seul plaquage étiré sur tout le plan, sans RepeatWrapping — le fog
// estompe de toute façon les bords lointains, donc l'absence de
// répétition ne se voit pas une fois en jeu.
const textureLoader = new THREE.TextureLoader();
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundTexture = textureLoader.load('sprites/decor/sol_herbe_01.png');
// Pas de wrapS/wrapT en RepeatWrapping ici : ClampToEdgeWrapping (défaut)
// convient puisqu'on étire une seule fois.
const groundMat = new THREE.MeshStandardMaterial({
  map: groundTexture,
  roughness: 1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Grille de debug retirée : elle servait à calibrer les positions avant
// d'avoir une vraie texture de sol. Maintenant que sol_herbe_01.png est en
// place, la grille masquait inutilement la texture.

// ===========================================
// SPRITE ENNEMI EN BILLBOARD (réglages validés à l'étape 2, inchangés)
// ===========================================
// textureLoader déjà déclaré plus haut (section SOL) — réutilisé ici.
const enemyTexture = textureLoader.load(
  'sprites/ennemis/01_goutteux/goutteux_idle_01.png'
);
enemyTexture.magFilter = THREE.NearestFilter;
enemyTexture.minFilter = THREE.NearestFilter;

const enemyMaterial = new THREE.SpriteMaterial({
  map: enemyTexture,
  transparent: true,
});
const enemySprite = new THREE.Sprite(enemyMaterial);
enemySprite.scale.set(1.8, 1.8, 1);
enemySprite.position.set(0, 1.8 / 2, -3);
scene.add(enemySprite);

// ===========================================
// DÉCOR : MUR DE FORÊT EN 3 COUCHES DE PROFONDEUR
// ===========================================
// Objectif (demandé) : que le feuillage comble tout le cadre — haut ET
// côtés — sans laisser de trous de ciel visible, comme l'image de
// référence (mur de forêt dense, pas une rangée d'arbres espacés).
//
// MÉTHODE DE CALCUL (pas de placement à l'oeil) :
// 1. Pour chaque couche de profondeur, frustumWidthAtDistance() donne la
//    largeur EXACTE du champ visible à cette distance (géométrie de la
//    caméra : 2 * distance * tan(FOV/2) * aspect ratio).
// 2. On couvre cette largeur +40% de marge de sécurité de chaque côté
//    (pour qu'aucun bord d'écran ne montre de trou, même sur des écrans
//    plus larges que la résolution de référence).
// 3. Le nombre d'arbres est calculé pour un chevauchement de ~35% entre
//    arbres voisins (espacement = 65% de la largeur du sprite).
// 4. La hauteur de sprite par couche a été vérifiée par projection réelle
//    (camera.project() sur le point sommet) pour confirmer que la canopée
//    dépasse bien le haut du cadre (NDC y > 1) à cette distance.
//
// Couche proche  (z≈-9,  largeur visible ≈28) : 17 arbres, hauteur 7.5
// Couche moyenne (z≈-13, largeur visible ≈36) : 17 arbres, hauteur 9.0
// Couche loin    (z≈-18, largeur visible ≈45) : 16 arbres, hauteur 11.0
//
// L'assombrissement progressif (en plus du fog) utilise la teinte du
// SpriteMaterial (color) pour renforcer l'effet de profondeur : les arbres
// lointains sont teintés plus sombre/bleuté avant même que le fog agisse,
// ce qui évite l'effet "tout à la même luminosité" remarqué sur le test précédent.

function makeBillboardSprite(texturePath, scaleX, scaleY, x, y, z, tintColor) {
  const tex = textureLoader.load(texturePath);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    fog: true,
    color: tintColor !== undefined ? tintColor : 0xffffff,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(scaleX, scaleY, 1);
  sprite.position.set(x, y, z);
  return sprite;
}

// Génère une rangée en arc léger (pas une ligne droite parfaite, pour
// casser la rigidité visuelle), avec un décalage de hauteur aléatoire léger
// pour que les arbres ne soient pas tous parfaitement alignés à la même
// hauteur de base (variation naturelle, comme un vrai sol irrégulier).
function generateForestLayer(count, zCenter, xSpreadHalf, treeHeight, treeWidthRatio) {
  const positions = [];
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0.5 : i / (count - 1);
    const x = -xSpreadHalf + t * (xSpreadHalf * 2);
    const zVariation = Math.sin(t * Math.PI) * (treeHeight * 0.2);
    // petite variation pseudo-aléatoire déterministe (basée sur l'index)
    // pour casser l'alignement parfait, sans dépendre de Math.random()
    // (déterministe = résultat reproductible et vérifiable par calcul)
    const jitterX = ((i * 37) % 7 - 3) * 0.15;
    const jitterZ = ((i * 53) % 5 - 2) * 0.25;
    positions.push({
      x: x + jitterX,
      z: zCenter - zVariation + jitterZ,
    });
  }
  return positions;
}

const treeFiles = ['feuillu_01.png', 'feuillu_02.png'];

// --- Couche PROCHE (la plus nette, la moins fondue dans le fog) ---
const nearLayer = generateForestLayer(17, -10, 20, 7.5, 0.62);
nearLayer.forEach((pos, i) => {
  const texFile = treeFiles[i % treeFiles.length];
  const h = 7.5 + (i % 3) * 0.4; // légère variation de hauteur (7.5 à 8.3)
  const w = h * 0.62;
  const tree = makeBillboardSprite(
    `sprites/decor/${texFile}`, w, h, pos.x, h / 2, pos.z,
    0xeaf2e6 // très légèrement teinté, presque blanc pur (couche proche = peu assombrie)
  );
  scene.add(tree);
});

// --- Couche MOYENNE (assombrissement modéré) ---
const midLayer = generateForestLayer(17, -14, 25, 9.0, 0.6);
midLayer.forEach((pos, i) => {
  const texFile = treeFiles[i % treeFiles.length];
  const h = 9.0 + (i % 3) * 0.5;
  const w = h * 0.6;
  const tree = makeBillboardSprite(
    `sprites/decor/${texFile}`, w, h, pos.x, h / 2, pos.z,
    0xb9c9c2 // teinte bleu-vert grisée, assombrissement modéré
  );
  scene.add(tree);
});

// --- Couche LOIN (la plus sombre/fondue, juste avant que le fog absorbe tout) ---
const farLayer = generateForestLayer(16, -19, 31, 11.0, 0.58);
farLayer.forEach((pos, i) => {
  const texFile = treeFiles[i % treeFiles.length];
  const h = 11.0 + (i % 3) * 0.6;
  const w = h * 0.58;
  const tree = makeBillboardSprite(
    `sprites/decor/${texFile}`, w, h, pos.x, h / 2, pos.z,
    0x6f8a8c // teinte bleu-gris sombre, la couche la plus profonde
  );
  scene.add(tree);
});

// --- Buissons : bordure proche de la clairière, devant la couche proche ---
// Positions calculées : arc de rayon 6.5, centré en z=-7, de -75° à +75°
// (inchangé par rapport à la version précédente, déjà validée visuellement).
const bushArc = [
  { x: -6.28, z: -7.50 },
  { x: -4.98, z: -8.25 },
  { x: -2.75, z: -8.77 },
  { x: 0.00,  z: -8.95 },
  { x: 2.75,  z: -8.77 },
  { x: 4.98,  z: -8.25 },
  { x: 6.28,  z: -7.50 },
  // quelques buissons additionnels plus éloignés sur les côtés, pour
  // raccorder visuellement la bordure de clairière au mur de forêt
  { x: -9.5,  z: -7.0 },
  { x: 9.5,   z: -7.0 },
];
const bushFiles = ['buisson_01.png', 'buisson_02.png', 'buisson_03.png', 'buisson_04.png'];
bushArc.forEach((pos, i) => {
  const texFile = bushFiles[i % bushFiles.length];
  const bush = makeBillboardSprite(
    `sprites/decor/${texFile}`,
    1.3, 1.1,
    pos.x, 1.1 / 2, pos.z,
    0xffffff
  );
  scene.add(bush);
});


// PLACEHOLDER JOUEUR EN SPRITE (et non Plane+lookAt comme essayé d'abord).
//
// CORRECTION suite à vérification visuelle par capture d'écran : la version
// Plane+lookAt() donnait un carré visiblement DÉFORMÉ/trapézoïdal (pas un
// carré net), parce que lookAt() oriente le Plane selon l'angle EXACT vers
// la caméra, ce qui inclut une légère perspective/distorsion quand la
// caméra n'est pas parfaitement alignée sur l'axe Z de l'objet. Un Sprite
// n'a pas ce problème car Three.js l'aligne TOUJOURS perpendiculairement à
// la direction de vue de la caméra, sans jamais déformer sa géométrie —
// comparaison testée et visible côte à côte avant ce choix.
const playerMat = new THREE.SpriteMaterial({
  color: 0xc94f4f,   // rouge, pour le distinguer clairement du sol vert et de l'ennemi noir
});
const playerPlaceholder = new THREE.Sprite(playerMat);
playerPlaceholder.scale.set(1, 1, 1);

// Position : avant-plan, légèrement à gauche du centre (comme le héros
// principal dans l'image de référence).
// y = 0.5 pour que la base du carré (1x1) touche le sol.
//
// z=2.0 vérifié par calcul de projection (project() sur les 4 sommets,
// avec la VRAIE matrice de transformation) : tous les sommets restent dans
// le cadre caméra avec une marge confortable (NDC y entre -0.871 et -0.364).
playerPlaceholder.position.set(-0.8, 0.5, 2.0);

scene.add(playerPlaceholder);


// ===========================================
// RESPONSIVE
// ===========================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===========================================
// BOUCLE DE RENDU
// ===========================================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
